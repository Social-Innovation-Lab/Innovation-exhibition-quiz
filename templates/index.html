{% extends "base.html" %}

{% block content %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
  <form method="POST" action="/start" class="card" style="width: 100%; max-width: 500px; box-sizing: border-box;">
    <img src="/static/brac-logo.jpg" alt="BRAC Logo" style="max-width: 120px; height: auto; margin: 0 auto 20px; display: block;">
    <h1 style="text-align: center;">BRAC Innovation Exhibition 2025</h1>
    <p style="text-align: center; font-size: 16px; color: #666; margin: -10px 0 30px;">Play the Quiz to Flex Your Reflex</p>
    <label>Full name
      <input name="name" type="text" placeholder="Your name" required autocomplete="name" style="box-sizing: border-box;">
    </label>
    <label>PIN
      <input name="pin" type="text" inputmode="numeric" pattern="[0-9]{6}" placeholder="6 digits" required style="box-sizing: border-box;">
    </label>
    <label>Phone
      <input name="phone" type="tel" inputmode="tel" autocomplete="tel" placeholder="01XXXXXXXXX" required style="box-sizing: border-box;">
    </label>
    <button type="submit" style="width: 100%; box-sizing: border-box;">Start Quiz</button>
  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
// Form validation feedback
document.querySelector('form').addEventListener('submit', function(e) {
  const pin = document.querySelector('input[name="pin"]');
  if (pin.value.length !== 6 || !/^\d{6}$/.test(pin.value)) {
    e.preventDefault();
    alert('PIN must be exactly 6 digits (numbers only)');
    pin.focus();
    return false;
  }
  console.log('Form submitting with valid data');
});

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/static/sw.js').catch(()=>{});
}
</script>
{% endblock %}
