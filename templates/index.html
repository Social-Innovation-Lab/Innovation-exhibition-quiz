{% extends "base.html" %}

{% block content %}
<div class="welcome-container">
  <!-- Hero Section with Animation -->
  <div class="hero-section">
    <img src="/static/innovation-exhibition-logo.png" alt="Innovation Exhibition" class="hero-logo">
    <p class="hero-subtitle">Let's see how BRAC-savvy you really are</p>
    
    <!-- How It Works Section -->
    <div class="how-it-works-card">
      <div class="steps-row">
        <div class="step-item">
          <div class="step-icon">📝</div>
          <div class="step-text">Register</div>
        </div>
        <div class="step-arrow">→</div>
        <div class="step-item">
          <div class="step-icon">🎯</div>
          <div class="step-text">Answer 10 Questions in 150 seconds</div>
        </div>
        <div class="step-arrow">→</div>
        <div class="step-item">
          <div class="step-icon">🏆</div>
          <div class="step-text">Win Prizes!</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Language Selection -->
  <div id="languageSelection" class="language-selection">
    <h2 class="selection-title">Select Language / ভাষা নির্বাচন করুন</h2>
    <div class="language-buttons">
      <button type="button" class="lang-btn" onclick="selectLanguage('en')">
        <span class="lang-icon">🇬🇧</span>
        <span class="lang-text">English</span>
      </button>
      <button type="button" class="lang-btn" onclick="selectLanguage('bn')">
        <span class="lang-icon">🇧🇩</span>
        <span class="lang-text">বাংলা</span>
      </button>
    </div>
  </div>

  <!-- Option Selection -->
  <div id="optionSelection" class="option-selection" style="display: none;">
    <h2 class="selection-title" id="registerTitle">Register to play</h2>
    <div class="option-buttons">
      <button type="button" class="option-btn" onclick="showForm('havePin')">
        <span class="btn-text" id="havePinText">Have PIN?</span>
        <span class="btn-desc" id="havePinDesc">Enter your 6-digit PIN</span>
      </button>
      <button type="button" class="option-btn" onclick="showForm('noPin')">
        <span class="btn-text" id="noPinText">Don't Have PIN?</span>
        <span class="btn-desc" id="noPinDesc">Register with Name & Phone</span>
      </button>
    </div>
  </div>

  <!-- Have PIN Form -->
  <form method="POST" action="/start" class="quiz-form" id="havePinForm" style="display: none;">
    <input type="hidden" name="form_type" value="have_pin">
    <input type="hidden" name="language" id="langHavePin" value="en">
    
    <h3 class="form-title" id="pinFormTitle">Enter Your PIN</h3>
    
    <div class="form-group">
      <label class="form-label">
        <span>PIN (6 digits)</span>
      </label>
      <input name="pin" type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required class="form-input" placeholder="Enter 6-digit PIN" id="pinInput">
    </div>
    
    <button type="submit" class="start-button" id="pinSubmitBtn" disabled>
      <span>Start Quiz</span>
      <span class="button-arrow">→</span>
    </button>
  </form>

  <!-- Don't Have PIN Form -->
  <form method="POST" action="/start" class="quiz-form" id="noPinForm" style="display: none;">
    <input type="hidden" name="form_type" value="no_pin">
    <input type="hidden" name="language" id="langNoPin" value="en">
    
    <h3 class="form-title" id="registerFormTitle">Register to Play</h3>
    
    <div class="form-group">
      <label class="form-label">
        <span>Full Name</span>
      </label>
      <input name="name" type="text" required autocomplete="name" class="form-input" placeholder="Enter your name" id="nameInput">
    </div>
    
    <div class="form-group">
      <label class="form-label">
        <span>Phone Number</span>
      </label>
      <input name="phone" type="tel" inputmode="tel" autocomplete="tel" maxlength="11" pattern="[0-9]{11}" required class="form-input" placeholder="Enter 11-digit phone number" id="phoneInput">
    </div>
    
    <button type="submit" class="start-button" id="phoneSubmitBtn" disabled>
      <span>Start Quiz</span>
      <span class="button-arrow">→</span>
    </button>
  </form>
</div>

<style>
.welcome-container {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 15px;
  background: linear-gradient(135deg, #FFA033 0%, #FF8A50 40%, #FF7860 70%, #EC407A 100%);
}

.hero-section {
  text-align: center;
  margin-bottom: 10px;
  animation: fadeInUp 0.6s ease-out;
}

.hero-logo {
  max-width: clamp(400px, 85vw, 650px);
  height: auto;
  margin: 0 auto 5px;
  display: block;
  animation: bounceIn 0.8s ease-out;
}


.hero-subtitle {
  font-size: clamp(14px, 2.5vw, 16px);
  color: #6B2D7B;
  font-weight: 700;
  margin: -100px 0 10px;
  animation: fadeInUp 0.6s ease-out 0.2s backwards;
}

.how-it-works-card {
  background: transparent;
  border: 2px solid rgba(107, 45, 123, 0.5);
  border-radius: 12px;
  padding: 10px 15px;
  max-width: 520px;
  margin: 0 auto;
  animation: fadeInUp 0.6s ease-out 0.3s backwards;
}

.steps-row {
  display: flex;
  gap: 10px;
  justify-content: center;
  align-items: center;
  flex-wrap: wrap;
}

.step-item {
  flex: 1;
  min-width: 70px;
  text-align: center;
  padding: 5px;
}

.step-arrow {
  font-size: 22px;
  color: #6B2D7B;
  font-weight: 700;
  flex-shrink: 0;
}

.step-icon {
  font-size: 26px;
  margin-bottom: 5px;
}

.step-text {
  font-size: 11px;
  font-weight: 600;
  color: #6B2D7B;
  line-height: 1.3;
}

/* Language Selection */
.language-selection {
  width: 100%;
  max-width: 500px;
  animation: fadeInUp 0.6s ease-out 0.5s backwards;
  margin-bottom: 20px;
}

.language-buttons {
  display: flex;
  gap: 20px;
  justify-content: center;
}

.lang-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 25px;
  background: transparent;
  border: 2px solid rgba(107, 45, 123, 0.6);
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s ease;
  min-width: 140px;
  justify-content: center;
}

.lang-btn:hover {
  background: rgba(107, 45, 123, 0.15);
  border-color: #6B2D7B;
  transform: translateY(-2px);
}

.lang-btn:active {
  transform: translateY(0);
}

.lang-btn.selected {
  background: linear-gradient(135deg, #6B2D7B 0%, #5A2468 100%);
  border-color: #6B2D7B;
  box-shadow: 0 4px 15px rgba(107, 45, 123, 0.3);
}

.lang-btn.selected .lang-text {
  color: white;
}

.lang-icon {
  font-size: 24px;
}

.lang-text {
  font-size: 16px;
  font-weight: 700;
  color: #6B2D7B;
}

.option-selection {
  width: 100%;
  max-width: 500px;
  animation: fadeInUp 0.6s ease-out 0.6s backwards;
}

.selection-title {
  text-align: center;
  font-size: 20px;
  color: #6B2D7B;
  margin-bottom: 20px;
  font-weight: 700;
}

.option-buttons {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.option-btn {
  width: 100%;
  background: rgba(255, 255, 255, 0.25);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.3);
  border-radius: 12px;
  padding: 15px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
  min-height: 75px;
}

.option-btn:hover {
  background: rgba(255, 255, 255, 0.35);
  border-color: rgba(255, 255, 255, 0.5);
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
}

.option-btn:active {
  transform: translateY(0);
}

.btn-text {
  font-size: 18px;
  font-weight: 700;
  color: #6B2D7B;
}

.btn-desc {
  font-size: 13px;
  color: #8B4D9B;
  text-align: center;
}

.quiz-form {
  width: 100%;
  max-width: 420px;
  background: rgba(255, 255, 255, 0.25);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.3);
  border-radius: 16px;
  padding: 25px;
  box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
  animation: fadeInUp 0.3s ease-out;
  position: relative;
}

.back-btn {
  background: #f0f0f0;
  border: none;
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  color: #666;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-bottom: 15px;
}

.back-btn:hover {
  background: #e0e0e0;
  color: #333;
}

.form-title {
  text-align: center;
  font-size: 22px;
  color: #6B2D7B;
  margin: 0 0 20px;
  font-weight: 700;
}

.form-group {
  margin-bottom: 18px;
}

.form-label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 600;
  color: #6B2D7B;
  margin-bottom: 6px;
  font-size: 14px;
}

.label-icon {
  font-size: 16px;
}

.form-input {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  border: 1px solid rgba(255, 255, 255, 0.4);
  border-radius: 10px;
  box-sizing: border-box;
  transition: all 0.3s ease;
  background: rgba(255, 255, 255, 0.9);
}

.form-input:focus {
  outline: none;
  border-color: #fff;
  background: white;
  box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.3);
  transform: scale(1.01);
}

.start-button {
  width: 100%;
  padding: 14px 20px;
  font-size: 18px;
  font-weight: 700;
  color: #6B2D7B;
  background: rgba(255, 255, 255, 0.3);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255, 255, 255, 0.4);
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
  min-height: 50px;
  margin-top: 6px;
}

.start-button:hover:not(:disabled) {
  background: rgba(255, 255, 255, 0.4);
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
}

.start-button:active:not(:disabled) {
  transform: translateY(0);
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
}

.start-button:disabled {
  background: rgba(255, 255, 255, 0.15);
  cursor: not-allowed;
  opacity: 0.5;
  box-shadow: none;
  transform: none;
}

.button-arrow {
  font-size: 24px;
  transition: transform 0.3s ease;
}

.start-button:hover .button-arrow {
  transform: translateX(5px);
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes bounceIn {
  0% {
    opacity: 0;
    transform: scale(0.3);
  }
  50% {
    transform: scale(1.05);
  }
  100% {
    opacity: 1;
    transform: scale(1);
  }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

/* Tablet Responsive */
@media (max-width: 768px) {
  .hero-logo {
    max-width: clamp(280px, 80vw, 450px);
  }
  
  .hero-subtitle {
    font-size: clamp(13px, 3vw, 15px);
    margin: -80px 0 10px;
  }
  
  .how-it-works-card {
    max-width: 90%;
    padding: 10px 15px;
  }
  
  .step-icon {
    font-size: 22px;
  }
  
  .step-text {
    font-size: 10px;
  }
  
  .step-arrow {
    font-size: 18px;
  }
  
  .language-selection {
    max-width: 90%;
  }
  
  .lang-btn {
    padding: 10px 20px;
    min-width: 120px;
  }
  
  .lang-icon {
    font-size: 22px;
  }
  
  .lang-text {
    font-size: 15px;
  }
  
  .option-selection {
    max-width: 90%;
  }
  
  .quiz-form {
    max-width: 90%;
    padding: 20px;
  }
}

/* Mobile Responsive */
@media (max-width: 480px) {
  .welcome-container {
    padding: 10px;
  }
  
  .hero-logo {
    max-width: clamp(220px, 85vw, 320px);
  }
  
  .hero-subtitle {
    font-size: clamp(12px, 3.5vw, 14px);
    margin: -60px 0 8px;
  }
  
  .how-it-works-card {
    padding: 8px 10px;
  }
  
  .steps-row {
    gap: 6px;
  }
  
  .step-item {
    min-width: 60px;
    padding: 4px;
  }
  
  .step-icon {
    font-size: 20px;
    margin-bottom: 3px;
  }
  
  .step-text {
    font-size: 9px;
  }
  
  .step-arrow {
    font-size: 16px;
  }
  
  .language-buttons {
    gap: 12px;
  }
  
  .lang-btn {
    padding: 10px 16px;
    min-width: 110px;
  }
  
  .lang-icon {
    font-size: 20px;
  }
  
  .lang-text {
    font-size: 14px;
  }
  
  .selection-title {
    font-size: 16px;
    margin-bottom: 15px;
  }
  
  .option-btn {
    padding: 12px;
    min-height: 65px;
  }
  
  .btn-text {
    font-size: 16px;
  }
  
  .btn-desc {
    font-size: 12px;
  }
  
  .quiz-form {
    padding: 18px;
  }
  
  .form-title {
    font-size: 20px;
  }
  
  .form-input {
    padding: 10px;
    font-size: 15px;
  }
  
  .start-button {
    padding: 12px 16px;
    font-size: 16px;
    min-height: 45px;
  }
}
</style>
{% endblock %}

{% block scripts %}
<script>
// Language translations
const translations = {
  en: {
    registerTitle: 'Register to play',
    havePinText: 'Have PIN?',
    havePinDesc: 'Enter your 6-digit PIN',
    noPinText: "Don't Have PIN?",
    noPinDesc: 'Register with Name & Phone',
    pinFormTitle: 'Enter Your PIN',
    registerFormTitle: 'Register to Play',
    pinLabel: 'PIN (6 digits)',
    pinPlaceholder: 'Enter 6-digit PIN',
    nameLabel: 'Full Name',
    namePlaceholder: 'Enter your name',
    phoneLabel: 'Phone Number',
    phonePlaceholder: 'Enter 11-digit phone number',
    startQuiz: 'Start Quiz'
  },
  bn: {
    registerTitle: 'খেলতে রেজিস্টার করুন',
    havePinText: 'পিন আছে?',
    havePinDesc: 'আপনার ৬ সংখ্যার পিন দিন',
    noPinText: 'পিন নেই?',
    noPinDesc: 'নাম ও ফোন দিয়ে রেজিস্টার করুন',
    pinFormTitle: 'আপনার পিন দিন',
    registerFormTitle: 'খেলতে রেজিস্টার করুন',
    pinLabel: 'পিন (৬ সংখ্যা)',
    pinPlaceholder: '৬ সংখ্যার পিন দিন',
    nameLabel: 'পূর্ণ নাম',
    namePlaceholder: 'আপনার নাম লিখুন',
    phoneLabel: 'ফোন নম্বর',
    phonePlaceholder: '১১ সংখ্যার ফোন নম্বর দিন',
    startQuiz: 'কুইজ শুরু করুন'
  }
};

let selectedLanguage = 'en';

function selectLanguage(lang) {
  selectedLanguage = lang;
  
  // Update hidden language fields
  document.getElementById('langHavePin').value = lang;
  document.getElementById('langNoPin').value = lang;
  
  // Update button selection state
  document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  
  // Apply translations
  const t = translations[lang];
  
  // Option selection
  document.getElementById('registerTitle').textContent = t.registerTitle;
  document.getElementById('havePinText').textContent = t.havePinText;
  document.getElementById('havePinDesc').textContent = t.havePinDesc;
  document.getElementById('noPinText').textContent = t.noPinText;
  document.getElementById('noPinDesc').textContent = t.noPinDesc;
  
  // Have PIN form
  document.getElementById('pinFormTitle').textContent = t.pinFormTitle;
  document.querySelector('#havePinForm .form-label span').textContent = t.pinLabel;
  document.getElementById('pinInput').placeholder = t.pinPlaceholder;
  document.querySelector('#havePinForm .start-button span:first-child').textContent = t.startQuiz;
  
  // No PIN form
  document.getElementById('registerFormTitle').textContent = t.registerFormTitle;
  const noPinLabels = document.querySelectorAll('#noPinForm .form-label span');
  noPinLabels[0].textContent = t.nameLabel;
  noPinLabels[1].textContent = t.phoneLabel;
  document.getElementById('nameInput').placeholder = t.namePlaceholder;
  document.getElementById('phoneInput').placeholder = t.phonePlaceholder;
  document.querySelector('#noPinForm .start-button span:first-child').textContent = t.startQuiz;
  
  // Hide language selection and show options
  document.getElementById('languageSelection').style.display = 'none';
  document.getElementById('optionSelection').style.display = 'block';
}

function showForm(type) {
  document.getElementById('optionSelection').style.display = 'none';
  
  if (type === 'havePin') {
    document.getElementById('havePinForm').style.display = 'block';
    document.getElementById('noPinForm').style.display = 'none';
  } else {
    document.getElementById('noPinForm').style.display = 'block';
    document.getElementById('havePinForm').style.display = 'none';
  }
}

function showOptions() {
  document.getElementById('optionSelection').style.display = 'block';
  document.getElementById('havePinForm').style.display = 'none';
  document.getElementById('noPinForm').style.display = 'none';
}

// Real-time validation for PIN input
const pinInput = document.getElementById('pinInput');
const pinSubmitBtn = document.getElementById('pinSubmitBtn');

if (pinInput && pinSubmitBtn) {
  pinInput.addEventListener('input', function() {
    const value = this.value.replace(/\D/g, ''); // Remove non-digits
    this.value = value; // Update input to only digits
    
    // Enable button only if exactly 6 digits
    if (value.length === 6) {
      pinSubmitBtn.disabled = false;
    } else {
      pinSubmitBtn.disabled = true;
    }
  });
}

// Real-time validation for Name and Phone inputs
const nameInput = document.getElementById('nameInput');
const phoneInput = document.getElementById('phoneInput');
const phoneSubmitBtn = document.getElementById('phoneSubmitBtn');

function validatePhoneForm() {
  if (!nameInput || !phoneInput || !phoneSubmitBtn) return;
  
  const nameValid = nameInput.value.trim().length > 0;
  const phoneValue = phoneInput.value.replace(/\D/g, '');
  const phoneValid = phoneValue.length === 11;
  
  // Enable button only if both name and phone are valid
  if (nameValid && phoneValid) {
    phoneSubmitBtn.disabled = false;
  } else {
    phoneSubmitBtn.disabled = true;
  }
}

if (nameInput && phoneInput && phoneSubmitBtn) {
  nameInput.addEventListener('input', validatePhoneForm);
  phoneInput.addEventListener('input', function() {
    const value = this.value.replace(/\D/g, ''); // Remove non-digits
    this.value = value; // Update input to only digits
    validatePhoneForm();
  });
}

// Form validation for Have PIN form
document.getElementById('havePinForm').addEventListener('submit', function(e) {
  const pin = this.querySelector('input[name="pin"]');
  if (pin.value.length !== 6 || !/^\d{6}$/.test(pin.value)) {
    e.preventDefault();
    alert('PIN must be exactly 6 digits (numbers only)');
    pin.focus();
    return false;
  }
  console.log('Have PIN form submitting');
});

// Form validation for No PIN form
document.getElementById('noPinForm').addEventListener('submit', function(e) {
  const name = this.querySelector('input[name="name"]');
  const phone = this.querySelector('input[name="phone"]');
  
  if (!name.value.trim()) {
    e.preventDefault();
    alert('Please enter your name');
    name.focus();
    return false;
  }
  
  if (!phone.value.trim()) {
    e.preventDefault();
    alert('Please enter your phone number');
    phone.focus();
    return false;
  }
  
  // Validate phone number is exactly 11 digits
  const phoneDigits = phone.value.replace(/\D/g, '');
  if (phoneDigits.length !== 11) {
    e.preventDefault();
    alert('Phone number must be exactly 11 digits');
    phone.focus();
    return false;
  }
  
  console.log('No PIN form submitting');
});

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/static/sw.js').catch(()=>{});
}
</script>
{% endblock %}
