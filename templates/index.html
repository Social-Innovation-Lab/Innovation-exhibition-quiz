{% extends "base.html" %}

{% block content %}
<div class="welcome-container">
  <!-- Hero Section with Animation -->
  <div class="hero-section">
    <img src="/static/brac-logo.jpg" alt="BRAC Logo" class="hero-logo">
    <h1 class="hero-title">BRAC Innovation Exhibition 2025</h1>
    <p class="hero-subtitle">Play the Quiz to Flex Your Reflex</p>
    
    <!-- How It Works Section -->
    <div class="how-it-works">
      <div class="step-card">
        <div class="step-icon">📝</div>
        <div class="step-text">Sign In</div>
      </div>
      <div class="step-arrow">→</div>
      <div class="step-card">
        <div class="step-icon">🎯</div>
        <div class="step-text">Answer 10 Questions</div>
      </div>
      <div class="step-arrow">→</div>
      <div class="step-card">
        <div class="step-icon">🏆</div>
        <div class="step-text">Win Prizes!</div>
      </div>
    </div>
  </div>

  <!-- Option Selection -->
  <div id="optionSelection" class="option-selection">
    <h2 class="selection-title">Choose an option to continue</h2>
    <div class="option-buttons">
      <button type="button" class="option-btn" onclick="showForm('havePin')">
        <span class="btn-icon">🔑</span>
        <span class="btn-text">Have PIN?</span>
        <span class="btn-desc">Enter your 6-digit PIN</span>
      </button>
      <button type="button" class="option-btn" onclick="showForm('noPin')">
        <span class="btn-icon">👤</span>
        <span class="btn-text">Don't Have PIN?</span>
        <span class="btn-desc">Register with Name & Phone</span>
      </button>
    </div>
  </div>

  <!-- Have PIN Form -->
  <form method="POST" action="/start" class="quiz-form" id="havePinForm" style="display: none;">
    <input type="hidden" name="form_type" value="have_pin">
    
    <button type="button" class="back-btn" onclick="showOptions()">← Back</button>
    
    <h3 class="form-title">Enter Your PIN</h3>
    
    <div class="form-group">
      <label class="form-label">
        <span class="label-icon">🔢</span>
        <span>PIN (6 digits)</span>
      </label>
      <input name="pin" type="text" inputmode="numeric" pattern="[0-9]{6}" required class="form-input" placeholder="Enter 6-digit PIN">
    </div>
    
    <button type="submit" class="start-button">
      <span>Start Quiz</span>
      <span class="button-arrow">→</span>
    </button>
  </form>

  <!-- Don't Have PIN Form -->
  <form method="POST" action="/start" class="quiz-form" id="noPinForm" style="display: none;">
    <input type="hidden" name="form_type" value="no_pin">
    
    <button type="button" class="back-btn" onclick="showOptions()">← Back</button>
    
    <h3 class="form-title">Register to Play</h3>
    
    <div class="form-group">
      <label class="form-label">
        <span class="label-icon">👤</span>
        <span>Full Name</span>
      </label>
      <input name="name" type="text" required autocomplete="name" class="form-input" placeholder="Enter your name">
    </div>
    
    <div class="form-group">
      <label class="form-label">
        <span class="label-icon">📱</span>
        <span>Phone Number</span>
      </label>
      <input name="phone" type="tel" inputmode="tel" autocomplete="tel" required class="form-input" placeholder="Enter phone number">
    </div>
    
    <button type="submit" class="start-button">
      <span>Start Quiz</span>
      <span class="button-arrow">→</span>
    </button>
  </form>
</div>

<style>
.welcome-container {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 15px;
  background: linear-gradient(135deg, #fff 0%, #fff5f7 100%);
}

.hero-section {
  text-align: center;
  margin-bottom: 25px;
  animation: fadeInUp 0.6s ease-out;
}

.hero-logo {
  max-width: 80px;
  height: auto;
  margin: 0 auto 12px;
  display: block;
  animation: bounceIn 0.8s ease-out;
}

.hero-title {
  font-size: clamp(20px, 4vw, 28px);
  color: #222;
  margin: 0 0 8px;
  font-weight: 700;
  animation: fadeInUp 0.6s ease-out 0.1s backwards;
}

.hero-subtitle {
  font-size: clamp(14px, 2.5vw, 16px);
  color: #e31837;
  font-weight: 600;
  margin: 0 0 20px;
  animation: fadeInUp 0.6s ease-out 0.2s backwards;
}

.how-it-works {
  display: flex;
  gap: 10px;
  justify-content: center;
  align-items: center;
  flex-wrap: wrap;
  max-width: 550px;
  margin: 0 auto;
}

.step-card {
  flex: 1;
  min-width: 100px;
  background: white;
  border-radius: 12px;
  padding: 15px 10px;
  box-shadow: 0 3px 8px rgba(227, 24, 55, 0.1);
  transition: all 0.3s ease;
  animation: fadeInUp 0.6s ease-out backwards;
}

.step-card:nth-child(1) { animation-delay: 0.3s; }
.step-card:nth-child(3) { animation-delay: 0.4s; }
.step-card:nth-child(5) { animation-delay: 0.5s; }

.step-arrow {
  font-size: 24px;
  color: #e31837;
  font-weight: 700;
  animation: fadeIn 0.6s ease-out 0.35s backwards, pulse 2s ease-in-out infinite;
  flex-shrink: 0;
}

.step-arrow:nth-child(2) { animation-delay: 0.35s; }
.step-arrow:nth-child(4) { animation-delay: 0.45s; }

.step-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 15px rgba(227, 24, 55, 0.15);
}

.step-icon {
  font-size: 28px;
  margin-bottom: 6px;
}

.step-text {
  font-size: 12px;
  font-weight: 600;
  color: #555;
}

.option-selection {
  width: 100%;
  max-width: 500px;
  animation: fadeInUp 0.6s ease-out 0.6s backwards;
}

.selection-title {
  text-align: center;
  font-size: 20px;
  color: #333;
  margin-bottom: 20px;
  font-weight: 700;
}

.option-buttons {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.option-btn {
  width: 100%;
  background: white;
  border: 3px solid #e0e0e0;
  border-radius: 16px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
  min-height: 120px;
}

.option-btn:hover {
  border-color: #e31837;
  transform: translateY(-3px);
  box-shadow: 0 8px 25px rgba(227, 24, 55, 0.2);
}

.option-btn:active {
  transform: translateY(0);
}

.btn-icon {
  font-size: 40px;
  margin-bottom: 5px;
}

.btn-text {
  font-size: 20px;
  font-weight: 700;
  color: #222;
}

.btn-desc {
  font-size: 14px;
  color: #666;
  text-align: center;
}

.quiz-form {
  width: 100%;
  max-width: 420px;
  background: white;
  border-radius: 16px;
  padding: 25px;
  box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
  animation: fadeInUp 0.3s ease-out;
  position: relative;
}

.back-btn {
  background: #f0f0f0;
  border: none;
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  color: #666;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-bottom: 15px;
}

.back-btn:hover {
  background: #e0e0e0;
  color: #333;
}

.form-title {
  text-align: center;
  font-size: 22px;
  color: #e31837;
  margin: 0 0 20px;
  font-weight: 700;
}

.form-group {
  margin-bottom: 18px;
}

.form-label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 600;
  color: #333;
  margin-bottom: 6px;
  font-size: 14px;
}

.label-icon {
  font-size: 16px;
}

.form-input {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  border: 2px solid #e0e0e0;
  border-radius: 10px;
  box-sizing: border-box;
  transition: all 0.3s ease;
  background: #fafafa;
}

.form-input:focus {
  outline: none;
  border-color: #e31837;
  background: white;
  box-shadow: 0 0 0 4px rgba(227, 24, 55, 0.1);
  transform: scale(1.01);
}

.start-button {
  width: 100%;
  padding: 14px 20px;
  font-size: 18px;
  font-weight: 700;
  color: white;
  background: linear-gradient(135deg, #e31837 0%, #c41430 100%);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(227, 24, 55, 0.3);
  min-height: 50px;
  margin-top: 6px;
}

.start-button:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(227, 24, 55, 0.4);
}

.start-button:active {
  transform: translateY(0);
  box-shadow: 0 4px 15px rgba(227, 24, 55, 0.3);
}

.button-arrow {
  font-size: 24px;
  transition: transform 0.3s ease;
}

.start-button:hover .button-arrow {
  transform: translateX(5px);
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes bounceIn {
  0% {
    opacity: 0;
    transform: scale(0.3);
  }
  50% {
    transform: scale(1.05);
  }
  100% {
    opacity: 1;
    transform: scale(1);
  }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}
</style>
{% endblock %}

{% block scripts %}
<script>
function showForm(type) {
  document.getElementById('optionSelection').style.display = 'none';
  
  if (type === 'havePin') {
    document.getElementById('havePinForm').style.display = 'block';
    document.getElementById('noPinForm').style.display = 'none';
  } else {
    document.getElementById('noPinForm').style.display = 'block';
    document.getElementById('havePinForm').style.display = 'none';
  }
}

function showOptions() {
  document.getElementById('optionSelection').style.display = 'block';
  document.getElementById('havePinForm').style.display = 'none';
  document.getElementById('noPinForm').style.display = 'none';
}

// Form validation for Have PIN form
document.getElementById('havePinForm').addEventListener('submit', function(e) {
  const pin = this.querySelector('input[name="pin"]');
  if (pin.value.length !== 6 || !/^\d{6}$/.test(pin.value)) {
    e.preventDefault();
    alert('PIN must be exactly 6 digits (numbers only)');
    pin.focus();
    return false;
  }
  console.log('Have PIN form submitting');
});

// Form validation for No PIN form
document.getElementById('noPinForm').addEventListener('submit', function(e) {
  const name = this.querySelector('input[name="name"]');
  const phone = this.querySelector('input[name="phone"]');
  
  if (!name.value.trim()) {
    e.preventDefault();
    alert('Please enter your name');
    name.focus();
    return false;
  }
  
  if (!phone.value.trim()) {
    e.preventDefault();
    alert('Please enter your phone number');
    phone.focus();
    return false;
  }
  
  console.log('No PIN form submitting');
});

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/static/sw.js').catch(()=>{});
}
</script>
{% endblock %}
