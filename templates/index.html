{% extends "base.html" %}

{% block content %}
<form method="POST" action="/start" class="card container">
  <h1>Exhibition Quiz</h1>
  <label>Full name
    <input name="name" type="text" placeholder="Your name" required autocomplete="name">
  </label>
  <label>PIN
    <input name="pin" type="text" inputmode="numeric" pattern="[0-9]{4,8}" placeholder="4–8 digits" required>
  </label>
  <label>Phone
    <input name="phone" type="tel" inputmode="tel" autocomplete="tel" placeholder="01XXXXXXXXX" required>
  </label>
  <label style="display:flex;gap:10px;align-items:center;margin:10px 0;">
    <input type="checkbox" name="consent" required>
    <span>I agree BRAC may store my details to contact winners.</span>
  </label>
  <button type="submit">Start Quiz</button>
</form>
{% endblock %}

{% block scripts %}
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/static/sw.js').catch(()=>{});
}
</script>
{% endblock %}
