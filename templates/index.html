{% extends "base.html" %}

{% block content %}
<div class="welcome-container">
  <!-- Hero Section with Animation -->
  <div class="hero-section">
    <img src="/static/brac-logo.jpg" alt="BRAC Logo" class="hero-logo">
    <h1 class="hero-title">BRAC Innovation Exhibition 2025</h1>
    <p class="hero-subtitle">Play the Quiz to Flex Your Reflex</p>
    
    <!-- How It Works Section -->
    <div class="how-it-works">
      <div class="step-card">
        <div class="step-icon">📝</div>
        <div class="step-text">Sign In</div>
      </div>
      <div class="step-arrow">→</div>
      <div class="step-card">
        <div class="step-icon">🎯</div>
        <div class="step-text">Answer 10 Questions</div>
      </div>
      <div class="step-arrow">→</div>
      <div class="step-card">
        <div class="step-icon">🏆</div>
        <div class="step-text">Win Prizes!</div>
      </div>
    </div>
  </div>

  <!-- Sign-in Form -->
  <form method="POST" action="/start" class="quiz-form">
    <div class="form-group">
      <label class="form-label">
        <span class="label-icon">👤</span>
        <span>Full name</span>
      </label>
      <input name="name" type="text" required autocomplete="name" class="form-input">
    </div>
    
    <div class="form-group">
      <label class="form-label">
        <span class="label-icon">🔢</span>
        <span>PIN (6 digits)</span>
      </label>
      <input name="pin" type="text" inputmode="numeric" pattern="[0-9]{6}" required class="form-input">
    </div>
    
    <div class="form-group">
      <label class="form-label">
        <span class="label-icon">📱</span>
        <span>Phone</span>
      </label>
      <input name="phone" type="tel" inputmode="tel" autocomplete="tel" required class="form-input">
    </div>
    
    <button type="submit" class="start-button">
      <span>Start Quiz</span>
      <span class="button-arrow">→</span>
    </button>
  </form>
</div>

<style>
.welcome-container {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px 20px;
  background: linear-gradient(135deg, #fff 0%, #fff5f7 100%);
  gap: 30px;
}

.hero-section {
  text-align: center;
  animation: fadeInUp 0.6s ease-out;
  width: 100%;
  max-width: 900px;
}

.hero-logo {
  max-width: 150px;
  height: auto;
  margin: 0 auto 25px;
  display: block;
  animation: bounceIn 0.8s ease-out;
}

.hero-title {
  font-size: clamp(28px, 5vw, 42px);
  color: #222;
  margin: 0 0 15px;
  font-weight: 700;
  animation: fadeInUp 0.6s ease-out 0.1s backwards;
}

.hero-subtitle {
  font-size: clamp(18px, 3vw, 24px);
  color: #e31837;
  font-weight: 600;
  margin: 0 0 35px;
  animation: fadeInUp 0.6s ease-out 0.2s backwards;
}

.how-it-works {
  display: flex;
  gap: 20px;
  justify-content: center;
  align-items: center;
  flex-wrap: wrap;
  max-width: 800px;
  margin: 0 auto;
}

.step-card {
  flex: 1;
  min-width: 140px;
  background: white;
  border-radius: 18px;
  padding: 25px 20px;
  box-shadow: 0 4px 12px rgba(227, 24, 55, 0.1);
  transition: all 0.3s ease;
  animation: fadeInUp 0.6s ease-out backwards;
}

.step-card:nth-child(1) { animation-delay: 0.3s; }
.step-card:nth-child(3) { animation-delay: 0.4s; }
.step-card:nth-child(5) { animation-delay: 0.5s; }

.step-arrow {
  font-size: 36px;
  color: #e31837;
  font-weight: 700;
  animation: fadeIn 0.6s ease-out 0.35s backwards, pulse 2s ease-in-out infinite;
  flex-shrink: 0;
}

.step-arrow:nth-child(2) { animation-delay: 0.35s; }
.step-arrow:nth-child(4) { animation-delay: 0.45s; }

.step-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 8px 20px rgba(227, 24, 55, 0.15);
}

.step-icon {
  font-size: 42px;
  margin-bottom: 10px;
}

.step-text {
  font-size: 15px;
  font-weight: 600;
  color: #555;
}

.quiz-form {
  width: 100%;
  max-width: 550px;
  background: white;
  border-radius: 24px;
  padding: 40px;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
  animation: fadeInUp 0.6s ease-out 0.6s backwards;
}

.form-group {
  margin-bottom: 28px;
}

.form-label {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 600;
  color: #333;
  margin-bottom: 10px;
  font-size: 17px;
}

.label-icon {
  font-size: 22px;
}

.form-input {
  width: 100%;
  padding: 18px;
  font-size: 18px;
  border: 2px solid #e0e0e0;
  border-radius: 14px;
  box-sizing: border-box;
  transition: all 0.3s ease;
  background: #fafafa;
}

.form-input:focus {
  outline: none;
  border-color: #e31837;
  background: white;
  box-shadow: 0 0 0 4px rgba(227, 24, 55, 0.1);
  transform: scale(1.01);
}

.start-button {
  width: 100%;
  padding: 20px 28px;
  font-size: 22px;
  font-weight: 700;
  color: white;
  background: linear-gradient(135deg, #e31837 0%, #c41430 100%);
  border: none;
  border-radius: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  transition: all 0.3s ease;
  box-shadow: 0 6px 20px rgba(227, 24, 55, 0.3);
  min-height: 65px;
  margin-top: 10px;
}

.start-button:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(227, 24, 55, 0.4);
}

.start-button:active {
  transform: translateY(0);
  box-shadow: 0 4px 15px rgba(227, 24, 55, 0.3);
}

.button-arrow {
  font-size: 24px;
  transition: transform 0.3s ease;
}

.start-button:hover .button-arrow {
  transform: translateX(5px);
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes bounceIn {
  0% {
    opacity: 0;
    transform: scale(0.3);
  }
  50% {
    transform: scale(1.05);
  }
  100% {
    opacity: 1;
    transform: scale(1);
  }
}
</style>
{% endblock %}

{% block scripts %}
<script>
// Form validation feedback
document.querySelector('form').addEventListener('submit', function(e) {
  const pin = document.querySelector('input[name="pin"]');
  if (pin.value.length !== 6 || !/^\d{6}$/.test(pin.value)) {
    e.preventDefault();
    alert('PIN must be exactly 6 digits (numbers only)');
    pin.focus();
    return false;
  }
  console.log('Form submitting with valid data');
});

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/static/sw.js').catch(()=>{});
}
</script>
{% endblock %}
