{% extends "base.html" %}

{% block content %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
  <form method="POST" action="/start" class="card" style="width: 100%; max-width: 500px;">
    <img src="/static/brac-logo.jpg" alt="BRAC Logo" style="max-width: 200px; height: auto; margin: 0 auto 20px; display: block;">
    <h1 style="text-align: center;">BRAC Innovation Exhibition 2025</h1>
    <p style="text-align: center; font-size: 16px; color: #666; margin: -10px 0 30px;">Play the Quiz to Flex Your Reflex</p>
    <label>Full name
      <input name="name" type="text" placeholder="Your name" required autocomplete="name">
    </label>
    <label>PIN
      <input name="pin" type="text" inputmode="numeric" pattern="[0-9]{6}" placeholder="6 digits" required>
    </label>
    <label>Phone
      <input name="phone" type="tel" inputmode="tel" autocomplete="tel" placeholder="01XXXXXXXXX" required>
    </label>
    <button type="submit" style="width: 100%;">Start Quiz</button>
  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/static/sw.js').catch(()=>{});
}
</script>
{% endblock %}
