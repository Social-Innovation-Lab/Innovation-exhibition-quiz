{% extends "base.html" %}

{% block content %}
<div class="progress container">
  <div>Answered <b id="ansCount">0</b>/10</div>
  <div class="bar"><i id="barFill"></i></div>
</div>

<form method="POST" action="/submit" id="quizForm" class="container">
  <!-- Hidden fields to pass participant data without cookies -->
  <input type="hidden" name="participant_id" value="{{participant_id}}">
  <input type="hidden" name="question_ids" value="{{question_ids|join(',')}}">
  
  {% for q in items %}
  <section class="card q-block">
    <h2>Question {{loop.index}}</h2>
    <p>{{q.question}}</p>
    {% set letters = ['A','B','C','D'] %}
    {% for opt in q.options %}
      <label class="opt">
        <input type="radio" name="{{q.id}}" value="{{letters[loop.index0]}}" required>
        <span><b>{{letters[loop.index0]}}.</b> {{opt}}</span>
      </label>
    {% endfor %}
  </section>
  {% endfor %}
  <button id="submitBtn" type="submit" disabled>Submit answers</button>
</form>
{% endblock %}

{% block scripts %}
<script src="/static/main.js"></script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/static/sw.js').catch(()=>{});
}
</script>
{% endblock %}
